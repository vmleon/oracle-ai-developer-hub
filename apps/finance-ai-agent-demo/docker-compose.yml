version: "3.9"

services:
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-ai-demo
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PWD: OraclePwd_2025
      ORACLE_SID: FREE
      ORACLE_PDB: FREEPDB1
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s / as sysdba || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  oracle_data:
